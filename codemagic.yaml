workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/KarteScanApp.xcworkspace"
        XCODE_SCHEME: "KarteScanApp"
        DEVELOPMENT_TEAM: "TN5DXWL8N9"
      node: v22
      xcode: 16.2
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Patch RCTTurboModule for iOS 26
        script: |
          python3 - << 'PYEOF'
          import sys
          path = 'node_modules/react-native/ReactCommon/react/nativemodule/core/platform/ios/ReactCommon/RCTTurboModule.mm'
          with open(path, 'r') as f:
              content = f.read()
          old = 'throw convertNSExceptionToJSError(runtime, exception, std::string{moduleName}, methodNameStr);'
          new = 'NSLog(@"[iOS26Patch] Suppressed ObjC exception in void TurboModule method: %@", exception); return;'
          if old in content:
              content = content.replace(old, new)
              with open(path, 'w') as f:
                  f.write(content)
              print('iOS 26 RCTTurboModule patch applied successfully')
          else:
              print('WARNING: Patch target not found - may be already patched or version mismatch')
              sys.exit(0)
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          python3 -c "
          import os
          key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
          key = key.replace('\\\\n', '\\n')
          open('/tmp/AuthKey.p8', 'w').write(key)
          print('API key written to /tmp/AuthKey.p8')
          "

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/KarteScanApp.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath /tmp/KarteScanApp.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - oyama0325baba@gmail.com
        notify:
          success: true
          failure: true
