workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/KarteScanApp.xcworkspace"
        XCODE_SCHEME: "KarteScanApp"
        BUNDLE_ID: "com.oyama.kartescanapp"
      node: v22
      xcode: 16.2
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Patch RCTTurboModule for iOS 26
        script: |
          python3 - << 'PYEOF'
          import sys
          path = 'node_modules/react-native/ReactCommon/react/nativemodule/core/platform/ios/ReactCommon/RCTTurboModule.mm'
          with open(path, 'r') as f:
              content = f.read()
          old = 'throw convertNSExceptionToJSError(runtime, exception, std::string{moduleName}, methodNameStr);'
          new = 'NSLog(@"[iOS26Patch] Suppressed ObjC exception in void TurboModule method: %@", exception); return;'
          if old in content:
              content = content.replace(old, new)
              with open(path, 'w') as f:
                  f.write(content)
              print('iOS 26 RCTTurboModule patch applied successfully')
          else:
              print('WARNING: Patch target not found - may be already patched or version mismatch')
              sys.exit(0)
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Create signing certificate and provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - oyama0325baba@gmail.com
        notify:
          success: true
          failure: true
