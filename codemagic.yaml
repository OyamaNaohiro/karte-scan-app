workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios-signing
      vars:
        XCODE_WORKSPACE: "ios/KarteScanApp.xcworkspace"
        XCODE_SCHEME: "KarteScanApp"
        BUNDLE_ID: "com.oyama.kartescanapp"
      node: v22
      xcode: 16.2
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Patch RCTTurboModule for iOS 26
        script: |
          python3 - << 'PYEOF'
          import sys
          path = 'node_modules/react-native/ReactCommon/react/nativemodule/core/platform/ios/ReactCommon/RCTTurboModule.mm'
          with open(path, 'r') as f:
              content = f.read()
          old = 'throw convertNSExceptionToJSError(runtime, exception, std::string{moduleName}, methodNameStr);'
          new = 'NSLog(@"[iOS26Patch] Suppressed ObjC exception in void TurboModule method: %@", exception); return;'
          if old in content:
              content = content.replace(old, new)
              with open(path, 'w') as f:
                  f.write(content)
              print('iOS 26 RCTTurboModule patch applied successfully')
          else:
              print('WARNING: Patch target not found - may be already patched or version mismatch')
              sys.exit(0)
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Generate app icon
        script: |
          python3 - << 'PYEOF'
          import struct, zlib, os

          def write_png(path, width, height, r, g, b):
              def chunk(tag, data):
                  c = tag + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              scanline = bytes([0] + [r, g, b] * width)
              raw = scanline * height
              png = (
                  b'\x89PNG\r\n\x1a\n'
                  + chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
                  + chunk(b'IDAT', zlib.compress(raw, 9))
                  + chunk(b'IEND', b'')
              )
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(png)

          write_png('ios/KarteScanApp/Images.xcassets/AppIcon.appiconset/AppIcon-1024.png', 1024, 1024, 0, 122, 255)
          print('App icon generated successfully')
          PYEOF

      - name: Create signing certificate and provisioning profile
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem \
            --profiles-dir "$PROFILES_DIR"

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Verify profiles installed
        script: |
          echo "=== Installed profiles ==="
          ls "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "No profiles found"

      - name: Validate storyboard
        script: |
          echo "=== ibtool validation ==="
          ibtool --errors --warnings --notices --output-format human-readable-text \
            ios/KarteScanApp/LaunchScreen.storyboard 2>&1 || true

      - name: Build iOS
        script: |
          PBXPROJ="ios/KarteScanApp.xcodeproj/project.pbxproj"

          # Bundle ID・署名設定を修正
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "TN5DXWL8N9";/g' "$PBXPROJ"

          echo "=== Bundle IDs in project ==="
          grep PRODUCT_BUNDLE_IDENTIFIER "$PBXPROJ"

          # Clear stale DerivedData cache
          rm -rf ~/Library/Developer/Xcode/DerivedData/KarteScanApp-*

          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - oyama0325baba@gmail.com
        notify:
          success: true
          failure: true
